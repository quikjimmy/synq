name: Deploy to VPS

on:
  push:
    branches: [main, master]
    paths:
      - 'synq-api/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # Clone repo on first deploy, pull on subsequent deploys
            if [ ! -d "$HOME/synq" ]; then
              git clone https://github.com/quikjimmy/synq.git "$HOME/synq"
            else
              git -C "$HOME/synq" pull origin $(git -C "$HOME/synq" rev-parse --abbrev-ref HEAD)
            fi

            cd "$HOME/synq/synq-api"

            # Create .env if it doesn't exist yet (first deploy only)
            if [ ! -f .env ]; then
              echo "JWT_SECRET=$(openssl rand -hex 32)" > .env
              echo "Created .env with random JWT_SECRET"
            fi

            # Stop existing containers cleanly before rebuild
            docker compose down --remove-orphans 2>/dev/null || true

            # Build and restart (host port 3201 -> container port 3200)
            docker compose up -d --build

            # Wait for API to respond on host port 3201 (up to 90s)
            echo "Waiting for API to respond on :3201..."
            API_UP=0
            for i in $(seq 1 18); do
              STATE=$(docker inspect --format='{{.State.Status}}' synq-api-api-1 2>/dev/null || echo "missing")
              echo "  [$i/18] container state=$STATE"
              if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ]; then
                echo "=== API container crashed — logs ==="
                docker compose logs --tail=80 api
                echo "==================================="
                exit 1
              fi
              if curl -sf http://localhost:3201/health >/dev/null 2>&1; then
                API_UP=1
                break
              fi
              sleep 5
            done

            if [ "$API_UP" = "0" ]; then
              echo "=== API did not respond — logs ==="
              docker compose logs --tail=80 api
              echo "=================================="
              exit 1
            fi

            # Run migrations (idempotent — safe to run every deploy)
            docker compose exec -T api node src/db/migrate.js

            curl -sf http://localhost:3201/health
            echo "Deploy complete — API is healthy on :3201"
